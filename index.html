<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>采购协同平台</title>
  <script type="module" crossorigin src="/procurement-platform/assets/index-DWk3Eky-.js"></script>
  <link rel="stylesheet" crossorigin href="/procurement-platform/assets/index-BhdSxnaw.css">
</head>
<body>
  <div id="root"></div>
  <script>
    // SPA redirect handler for GitHub Pages
    (function(l){
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
</body>
